name: healthfire

services:
  build:
    build: .
    image: healthfire-android:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - gradle-cache:/root/.gradle
      # Persists ~/.android/debug.keystore so the debug signing key (and its
      # SHA-1, used for Firebase auth) stays stable across builds.
      - debug-keystore:/root/.android
    command: gradle --no-daemon assembleDebug

volumes:
  gradle-cache:
  debug-keystore:
